{% extends 'info/base.html' %}
{% load crispy_forms_tags %}
{% load static %}
{% block content %}
    <div class="container bg-light shadow-md p-5 form-layout">
        <h2>Aviso de Correspondência</h2>
        <hr>
        <br>
            <form method="POST" enctype="multipart/form-data" autocomplete="off">
                {% csrf_token %}
                {{ form|crispy }}
                <br>
                <br>
                <button id="submit" type="submit" class="btn btn-primary w-100 btn-block p-2">Avisar Morador</button>
                <br>
            </form>
        <br>

    </div>
    <br>
    <script src="https://code.jquery.com/jquery-3.6.4.min.js" crossorigin="anonymous"></script>
    <script>
     const ALLOW_ALL_OPTION = {% if template_type == 'report' %}true{% else %}false{% endif %};
    </script>
    <script src="{% static 'js/order_notification.js' %}"></script>

{% endblock %}
