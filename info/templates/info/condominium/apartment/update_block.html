{% extends 'info/base.html' %}
{% load crispy_forms_tags %}
{% load static %}
{% block content %}
    <div class="container bg-light shadow-md p-5 form-layout">
        <h2>Atualizar Bloco</h2>
        <hr>
        <br>
        <form method="POST" autocomplete="off">
            {% csrf_token %}

            <div id="block-list">
                {{ form|crispy }}
            </div>
            <br>
            <br>
            <button type="submit" class="btn btn-primary w-100 btn-block p-2">ATUALIZAR</button>
            <br>
        </form>

        <br>

    </div>
    <br>

{% endblock %}
