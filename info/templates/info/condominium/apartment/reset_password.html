{% extends 'info/base.html' %}
{% load crispy_forms_tags %}
{% load static %}
{% block content %}
    <div class="container bg-light shadow-md p-5 detail-layout">
        <h2>Deseja resetar senha do morador:</h2>
        <hr>
        <br>
        <div class="container">
            <div class="row">
                <div class="col">
                    Nome: {{ profile.condominium_name }}
                </div>
            </div>
            <div class="row">
                <div class="col">
                    Email: {{ profile.email }}
                </div>
            </div>
            <br>
            <span style="color: red; font-weight: bold;"><p>Ao efetuar o reset a nova senha será 1234</p></span>
            <br>

            <div class="row my-3">
                <div class="col">
                    <a id="block-link my-2" href="{% url 'info:resident-confirm-reset' profile.id %}"
                       class="btn btn-outline-success">
                        {#                <a id="block-link" href="#" class="btn btn-outline-danger">#}
                        SIM <i class="fa-solid fa-user-lock"></i>
                    </a>
                </div>
                <div class="col">
                    <a id="block-link my-2" href="{% url 'info:update-resident' resident.id %}"
                       class="btn btn-outline-danger">
                        {#                <a id="block-link" href="#" class="btn btn-outline-danger">#}
                        NÃO <i class="fa-solid fa-user-lock"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>
    <br>


{% endblock %}
