{% extends 'info/base.html' %}
{% load crispy_forms_tags %}
{% load static %}
{% block content %}
    <div class="container bg-light shadow-md p-5 form-layout">
        <h2>Produto</h2>
        <hr>
        <br>
        <br>
        <form method="POST" autocomplete="off">
            {% csrf_token %}
            {{ form|crispy }}
            <br>
            {% if img %}
                <img src="{{ img.url }}" alt="Thumbnail" style="width: 100%">
            {% endif %}
            <br>
            <br>
            <div class="text-center">
                <a id="return-link" href="{% url 'info:products' %}" class="btn btn-danger">
                    <i class="fa fa-arrow-left"> Voltar</i>
                </a>
            </div>
        </form>
        <br>
    </div>
    <br>

{% endblock %}
