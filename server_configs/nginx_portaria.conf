server {
    if ($host = www.appportaria.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = appportaria.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name appportaria.com www.appportaria.com;
    return 404; # managed by Certbot




}
