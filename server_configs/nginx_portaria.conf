server {
    server_name appportaria.com www.appportaria.com;
    #ssl_certificate /etc/letsencrypt/live/appportaria.com/fullchain.pem; # managed by Certbot
    #ssl_certificate_key /etc/letsencrypt/live/appportaria.com/privkey.pem; # managed by Certbot

    #include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    #ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

    client_max_body_size 100M;
    client_body_buffer_size 100M;

    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }

    location /static/ {
        alias /var/www/static_cdn/;
    }

    location /media/ {
        alias /var/www/media_cdn/;
    }

    location / {
        include proxy_params;
        proxy_pass http://unix:/run/gunicorn.sock;

    }



    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/appportaria.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/appportaria.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}

